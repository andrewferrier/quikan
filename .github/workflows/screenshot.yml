name: Update Demo Screenshot

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Capture demo screenshot
        run: npm run screenshot

      - name: Commit screenshot if pixels changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git show HEAD:screenshot.png > /tmp/screenshot_old.png 2>/dev/null || true
          if [ -s /tmp/screenshot_old.png ]; then
            PIXEL_DIFF=$(compare -metric AE /tmp/screenshot_old.png screenshot.png /dev/null 2>&1) || true
            if [ "$PIXEL_DIFF" = "0" ]; then
              echo "No pixel changes, skipping commit."
              exit 0
            fi
          fi
          git add screenshot.png
          git commit -m "chore: update demo screenshot [skip ci]"
          git push
